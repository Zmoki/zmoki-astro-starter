name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Redirects drift check
        run: npm run check:redirects

      - name: Headers drift check
        run: npm run check:headers

      # Persist Astro's build cache across runs. `npm ci` wipes node_modules, so
      # this restores node_modules/.astro — where Astro caches optimized images
      # (assets/) and downloaded fonts — so unchanged images aren't re-downloaded
      # or re-processed. Entries are keyed by source content hash internally, so a
      # partially-stale cache is always safe. github.sha in the key saves a fresh
      # cache each run; restore-keys fall back to the most recent prior one.
      - name: Cache Astro build artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            astro-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            astro-${{ runner.os }}-

      - name: Build
        run: npm run build
        env:
          # Analytics/captcha default off; turn them on for main so this build
          # reflects what production actually ships (off for PRs).
          PUBLIC_ANALYTICS_ENABLED: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          PUBLIC_CAPTCHA_ENABLED: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}

      - name: Structured data check
        run: npm run check:sd

      - name: Internal link check
        run: npm run check:links

      - name: Sitemap check
        run: npm run check:sitemap
